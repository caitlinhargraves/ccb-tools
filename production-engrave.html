<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCB Engrave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

:root{--bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:#e2e0d8;--border2:#d0cec4;--text:#1a1916;--text2:#6b6960;--text3:#9b9890;--green:#2d6a4f;--green-bg:#e8f5ee;--green-border:#b7dfc9;--amber:#92400e;--amber-bg:#fef3c7;--amber-border:#fcd34d;--red:#991b1b;--red-bg:#fee2e2;--red-border:#fca5a5;--blue:#1e3a5f;--blue-bg:#dbeafe;--blue-border:#93c5fd;--radius:8px;--radius-lg:12px;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:12px}
.logo-mark{width:28px;height:28px;background:var(--logo-bg,var(--text));border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:9px;font-weight:500;color:white;letter-spacing:.5px;flex-shrink:0}
.header-title{font-size:15px;font-weight:500;letter-spacing:-.01em}
.station-pill{font-size:11px;padding:2px 10px;border-radius:10px;font-weight:500;white-space:nowrap}
.header-right{display:flex;align-items:center;gap:10px}
.last-updated{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3)}
.back-btn{font-size:12px;color:var(--text2);text-decoration:none;display:flex;align-items:center;gap:4px;padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius);transition:all .15s}
.back-btn:hover{background:var(--surface2);color:var(--text)}
.back-btn svg{width:12px;height:12px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.refresh-btn{display:flex;align-items:center;gap:6px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text2);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:6px 12px;cursor:pointer;transition:all .15s}
.refresh-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.refresh-btn:disabled{opacity:.5;cursor:not-allowed}
.refresh-btn svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.refresh-btn.spinning svg{animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
main{max-width:1200px;margin:0 auto;padding:24px 20px}
.stats-row{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.stat-card{background:var(--surface2);border:.5px solid var(--border);border-radius:var(--radius);padding:14px 20px;flex:1;min-width:120px}
.stat-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:6px}
.stat-value{font-family:'DM Mono',monospace;font-size:28px;font-weight:400;color:var(--text);line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:12px;color:var(--text2)}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--text2);border-radius:50%;animation:spin .7s linear infinite}
.error-box{background:var(--red-bg);border:1px solid var(--red-border);border-radius:var(--radius-lg);padding:20px 24px;color:var(--red);font-size:13px}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;margin-top:28px}
.section-header:first-child{margin-top:0}
.section-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);white-space:nowrap}
.section-count{font-size:11px;font-family:'DM Mono',monospace;background:var(--surface2);border:.5px solid var(--border);border-radius:10px;padding:1px 7px;color:var(--text3)}
.section-line{flex:1;height:1px;background:var(--border)}
.product-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow);transition:opacity .3s,transform .3s}
.product-card.fading{opacity:0;transform:translateY(-6px)}
.product-card.locked{border-left:3px solid var(--amber-border)}
.product-card.qcd{border-left:3px solid var(--green-border)}
.card-header{display:grid;grid-template-columns:1fr auto;gap:16px;padding:14px 18px 12px;border-bottom:1px solid var(--border);background:var(--surface2);align-items:start}
.card-name{font-size:14px;font-weight:500;letter-spacing:-.01em;margin-bottom:4px}
.card-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.chip{font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid var(--border);color:var(--text2);background:var(--surface);white-space:nowrap}
.chip.due-soon{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.chip.overdue{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.chip.ok{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.chip.qc-ok{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.chip.qc-pending{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.card-body{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:0;border-bottom:1px solid var(--border)}
.info-cell{padding:10px 14px;border-right:1px solid var(--border)}
.info-cell:last-child{border-right:none}
.info-cell.wide{grid-column:1/-1}
.info-lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:3px}
.info-val{font-size:12px;color:var(--text);word-break:break-word}
.info-val.mono{font-family:'DM Mono',monospace;font-size:11px}
.info-val.muted{color:var(--text2)}
.card-footer{padding:12px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.footer-left{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.footer-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.deco-select{font-size:12px;font-family:'DM Sans',sans-serif;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);cursor:pointer}
.deco-select:focus{outline:none;border-color:var(--text)}
.qc-btn{font-size:12px;font-family:'DM Sans',sans-serif;padding:6px 12px;background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:var(--radius);cursor:pointer;transition:all .15s;white-space:nowrap}
.qc-btn:hover{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.qc-btn.qcd{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.decorated-btn{font-size:12px;font-family:'DM Sans',sans-serif;padding:7px 16px;background:var(--decorated-btn-bg,var(--text));color:white;border:none;border-radius:var(--radius);cursor:pointer;transition:opacity .15s;white-space:nowrap}
.decorated-btn:hover{opacity:.85}
.decorated-btn:disabled{opacity:.4;cursor:not-allowed}
.decorated-btn.locked-btn{background:var(--amber)}
.media-btn{font-size:11px;padding:4px 9px;background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:4px;cursor:pointer;text-decoration:none;display:inline-block;transition:all .15s}
.media-btn:hover{background:var(--surface2)}
.deco-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;white-space:nowrap}
.recently-section{margin-top:36px;border-top:1px solid var(--border);padding-top:20px}
.recently-header{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:10px}
.recent-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.recent-table th{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap}
.recent-table td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text);vertical-align:middle}
.recent-table tr:last-child td{border-bottom:none}
.done-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.station-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:28px}
.station-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);text-decoration:none;color:inherit;display:block;transition:transform .15s,box-shadow .15s}
.station-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.station-card-header{padding:12px 16px 10px;border-bottom:1px solid var(--border)}
.station-name{font-size:14px;font-weight:500;margin-bottom:6px}
.station-counts{display:flex;gap:8px}
.scount{font-size:11px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:4px;border:1px solid var(--border)}
.scount.upcoming{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.scount.active{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-border)}
.station-card-footer{padding:8px 16px;font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.station-card-footer svg{width:11px;height:11px;stroke:var(--text3);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.empty-msg{font-size:13px;color:var(--text2);padding:20px 0}
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:white;font-size:13px;padding:10px 16px;border-radius:var(--radius);display:flex;align-items:center;gap:8px;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;z-index:999}
.toast.visible{opacity:1;transform:translateY(0)}
.toast-spinner{width:14px;height:14px;border:1.5px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite}
.mono{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2)}
.pname{max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

:root{--logo-bg:#6b21a8;--decorated-btn-bg:#6b21a8}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="logo-mark">CCB</div>
    <span class="header-title">Production</span>
    <span class="station-pill" style="background:#f3e8ff;color:#6b21a8;border:1px solid #6b21a833">Engrave</span>
  </div>
  <div class="header-right">
    <a class="back-btn" href="production.html">
      <svg viewBox="0 0 12 12"><path d="M8 2L4 6l4 4"/></svg>
      All Stations
    </a>
    <span class="last-updated" id="last-updated"></span>
    <button class="refresh-btn" id="refresh-btn" onclick="loadData()">
      <svg viewBox="0 0 16 16"><path d="M1 4s1-3 7-3a7 7 0 0 1 7 7"/><path d="M15 12s-1 3-7 3a7 7 0 0 1-7-7"/><polyline points="1 1 1 4 4 4"/><polyline points="15 15 15 12 12 12"/></svg>
      Refresh
    </button>
  </div>
</header>
<main>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Upcoming</div><div class="stat-value" id="stat-up">—</div><div class="stat-sub">product ordered</div></div>
    <div class="stat-card"><div class="stat-label">Active</div><div class="stat-value" id="stat-ac">—</div><div class="stat-sub">ready to decorate</div></div>
    <div class="stat-card"><div class="stat-label">Done This Session</div><div class="stat-value" id="stat-done">0</div><div class="stat-sub">decorated today</div></div>
  </div>
  <div id="content">
    <div class="loading-state"><div class="spinner"></div><span style="font-size:13px;color:var(--text2)">Loading Engrave queue...</span></div>
  </div>
  <div id="recently-section" style="display:none">
    <div class="recently-section">
      <div class="recently-header">Decorated this session</div>
      <table class="recent-table">
        <thead><tr><th>Product</th><th>Order</th><th>Qty</th><th>Color</th><th>Size</th><th>In Hands</th><th>Status</th></tr></thead>
        <tbody id="recently-list"></tbody>
      </table>
    </div>
  </div>
</main>
<div class="toast" id="toast"><div class="toast-spinner" id="toast-spinner"></div><span id="toast-msg"></span></div>
<script>

const API_KEY='eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjY0MTk0NTk5MCwiYWFpIjoxMSwidWlkIjoxMDE3MTA4NjgsImlhZCI6IjIwMjYtMDQtMDZUMTQ6MDg6NTcuMDAwWiIsInBlciI6Im1lOndyaXRlIiwiYWN0aWQiOjM0NDk0MDk3LCJyZ24iOiJ1c2UxIn0.ihgQ7xsNZfKIQjaHDVWUy_7BY0aWoeWjS1oTEkTCKTg';
const ORDERS_BOARD='18407165363';const SUBS_BOARD='18407165552';
const O_NUM='pulse_id_mm27vwa5';const O_STATUS='color_mm27qyta';const O_INHAND='date_mm22wpk2';const O_CONTACT='text_mm221kg3';
const S_STATUS='color_mm25v786';const S_TYPE='color_mm2dd6d5';const S_QTY='numeric_mm22crjt';const S_COLOR='text_mm2276wz';const S_SIZE='text_mm22yw8s';const S_STYLE='text_mm22fv7y';const S_DECO='dropdown_mm22dn1f';const S_PLACEMENT='text_mm226hzf';const S_ARTWORK_DESC='text_mm2521d5';const S_PROD_NOTES='long_text_mm27e9c4';const S_MOCKUP='file_mm26e29h';const S_ARTWORK='file_mm221c09';const S_PROOF='file_mm25ph2d';const S_QC='boolean_mm27779w';
const DECO_STYLES={1:'Embroidery',2:'Screenprint',3:'DTG',4:'DTF',5:'Engrave',6:'Other'};
const DECO_DISPLAY={1:'Embroidery',2:'Screenprint',3:'DTG / DTF',4:'DTG / DTF',5:'Engrave',6:'Other'};
const DECO_BG={'Embroidery':'#dbeafe','Screenprint':'#fef3c7','DTG / DTF':'#e8f5ee','DTG':'#e8f5ee','DTF':'#e8f5ee','Engrave':'#f3e8ff','Other':'#f0efe9'};
const DECO_TC={'Embroidery':'#1e3a5f','Screenprint':'#92400e','DTG / DTF':'#2d6a4f','DTG':'#2d6a4f','DTF':'#2d6a4f','Engrave':'#6b21a8','Other':'#6b6960'};
const STATION_URLS={Embroidery:'production-embroidery.html',Screenprint:'production-screenprint.html','DTG / DTF':'production-dtgdtf.html','DTG':'production-dtgdtf.html','DTF':'production-dtgdtf.html',Engrave:'production-engrave.html',Other:'production-other.html'};
const STATION_DISPLAY_NAMES=['Embroidery','Screenprint','DTG / DTF','Engrave','Other'];

async function mq(q){const r=await fetch('https://api.monday.com/v2',{method:'POST',headers:{'Content-Type':'application/json','Authorization':API_KEY,'API-Version':'2024-01'},body:JSON.stringify({query:q})});const d=await r.json();if(d.errors)throw new Error(d.errors[0].message);return d.data;}
function ffile(val,txt){if(!val&&!txt)return null;try{const p=JSON.parse(val||'{}');if(p.files&&p.files.length)return p.files[p.files.length-1].url||p.files[p.files.length-1].public_url||null;}catch(e){}const m=((val||'')+' '+(txt||'')).match(/https?:\/\/[^\s"',)]+/);return m?m[0]:null;}
function duechip(d){if(!d)return'<span class="chip">No date</span>';const due=new Date(d+'T00:00:00');const t=new Date();t.setHours(0,0,0,0);const diff=Math.round((due-t)/86400000);const fmt=due.toLocaleDateString('en-US',{month:'short',day:'numeric'});if(diff<0)return`<span class="chip overdue">Due ${fmt}</span>`;if(diff===0)return`<span class="chip due-soon">Due Today</span>`;if(diff<=3)return`<span class="chip due-soon">Due ${fmt}</span>`;return`<span class="chip ok">Due ${fmt}</span>`;}
function fdatestr(d){if(!d)return'—';const due=new Date(d+'T00:00:00');const t=new Date();t.setHours(0,0,0,0);const diff=Math.round((due-t)/86400000);const fmt=due.toLocaleDateString('en-US',{month:'short',day:'numeric'});if(diff<0)return`<span style="color:var(--red);font-weight:500">${fmt} (${Math.abs(diff)}d late)</span>`;if(diff===0)return`<span style="color:var(--amber);font-weight:500">Today</span>`;if(diff<=3)return`<span style="color:var(--amber);font-weight:500">${fmt}</span>`;return`<span style="color:var(--green)">${fmt}</span>`;}
function showToast(msg,spinning=true){document.getElementById('toast-msg').textContent=msg;document.getElementById('toast-spinner').style.display=spinning?'block':'none';document.getElementById('toast').classList.add('visible');}
function hideToast(d=1500){setTimeout(()=>document.getElementById('toast').classList.remove('visible'),d);}

async function markDecorated(subId,orderId,btn){
  const p=allActive.find(x=>x.id===subId)||allUpcoming.find(x=>x.id===subId);
  if(p&&!p.qc){showToast('QC sign-off required first',false);hideToast(2500);return;}
  btn.disabled=true;btn.textContent='Updating...';
  showToast('Marking decorated...');
  try{
    await mq(`mutation{change_column_value(board_id:${SUBS_BOARD},item_id:${subId},column_id:"${S_STATUS}",value:"{\\"index\\":8}"){id}}`);
    try{
      const chk=await mq(`{items(ids:[${orderId}]){subitems{id column_values(ids:["${S_STATUS}","${S_TYPE}"]){id text}}}}`);
      const subs=chk.items[0]?.subitems||[];
      const ihSubs=subs.filter(s=>{const sc={};for(const c of s.column_values)sc[c.id]=c;return(sc[S_TYPE]?.text||'').toLowerCase()==='in house decoration';});
      const allDone=ihSubs.every(s=>{const sc={};for(const c of s.column_values)sc[c.id]=c;return(sc[S_STATUS]?.text||'').toLowerCase()==='decorated'||s.id===subId;});
      if(allDone)await mq(`mutation{change_column_value(board_id:${ORDERS_BOARD},item_id:${orderId},column_id:"${O_STATUS}",value:"{\\"index\\":2}"){id}}`);
    }catch(e){}
    if(p){sessionDone.unshift(p);allActive=allActive.filter(x=>x.id!==subId);allUpcoming=allUpcoming.filter(x=>x.id!==subId);}
    showToast('Decorated',false);hideToast();
    const card=document.getElementById('card-'+subId);
    if(card){card.classList.add('fading');setTimeout(()=>{renderContent();renderRecentlyDone();updateStats();},400);}
  }catch(err){btn.disabled=false;btn.textContent='✓ Mark Decorated';showToast('Error: '+err.message,false);hideToast(3000);}
}

async function toggleQC(subId,checked,btn){
  btn.disabled=true;
  showToast(checked?'Marking QC approved...':'Removing QC...');
  try{
    await mq(`mutation{change_column_value(board_id:${SUBS_BOARD},item_id:${subId},column_id:"boolean_mm27779w",value:"{\\"checked\\":\\"${checked?'true':'false'}\\"}"){ id}}`);
    const p=allActive.find(x=>x.id===subId)||allUpcoming.find(x=>x.id===subId);
    if(p)p.qc=checked;
    btn.className='qc-btn'+(checked?' qcd':'');
    btn.textContent=checked?"✓ QC'd":'QC Sign-off';
    btn.disabled=false;
    // update the card lock state
    const card=document.getElementById('card-'+subId);
    if(card){card.className='product-card '+(checked?'qcd':'locked');}
    // update decorated btn
    const decBtn=document.getElementById('dec-btn-'+subId);
    if(decBtn){decBtn.className='decorated-btn'+(checked?'':' locked-btn');decBtn.textContent=checked?'✓ Mark Decorated':'🔒 QC Required';}
    // update qc chip in header
    const qcChip=document.getElementById('qc-chip-'+subId);
    if(qcChip){qcChip.className='chip '+(checked?'qc-ok':'qc-pending');qcChip.textContent=checked?"✓ QC'd":'Awaiting QC';}
    showToast(checked?'QC approved':'QC removed',false);hideToast();
  }catch(err){btn.disabled=false;showToast('Error: '+err.message,false);hideToast(3000);}
}

async function moveStation(subId,newStyleId,selectEl){
  showToast('Reassigning station...');
  try{
    await mq(`mutation{change_column_value(board_id:${SUBS_BOARD},item_id:${subId},column_id:"${S_DECO}",value:"{\\"ids\\":[${newStyleId}]}"){id}}`);
    showToast('Reassigned',false);hideToast();
    setTimeout(()=>loadData(),600);
  }catch(err){showToast('Error: '+err.message,false);hideToast(3000);}
}

function decoSelectHTML(p){
  const opts=[[1,'Embroidery'],[2,'Screenprint'],[3,'DTG'],[4,'DTF'],[5,'Engrave'],[6,'Other']];
  return `<select class="deco-select" onchange="moveStation('${p.id}',this.value,this)">${opts.map(([id,name])=>`<option value="${id}" ${p.decoStyleId==id?'selected':''}>${name}</option>`).join('')}</select>`;
}

function buildCard(p,section){
  const locked=!p.qc;
  const bg=DECO_BG[p.decoStyleDisplay]||'#f0efe9';const tc=DECO_TC[p.decoStyleDisplay]||'#6b6960';
  const mediaLinks=[p.mockupUrl?`<a class="media-btn" href="${p.mockupUrl}" target="_blank">Mockup</a>`:'',p.artworkUrl?`<a class="media-btn" href="${p.artworkUrl}" target="_blank">Artwork</a>`:'',p.proofUrl?`<a class="media-btn" href="${p.proofUrl}" target="_blank">Proof</a>`:''].filter(Boolean).join('');
  const opts=[[1,'Embroidery'],[2,'Screenprint'],[3,'DTG'],[4,'DTF'],[5,'Engrave'],[6,'Other']];
  const decoSel=`<select class="deco-select" onchange="moveStation('${p.id}',this.value,this)">${opts.map(([id,name])=>`<option value="${id}" ${p.decoStyleId===id?'selected':''}>${name}</option>`).join('')}</select>`;
  return `<div class="product-card ${locked?'locked':'qcd'}" id="card-${p.id}">
    <div class="card-header">
      <div>
        <div class="card-name">${p.name}</div>
        <div class="card-meta">
          <span class="chip" style="font-family:'DM Mono',monospace">${p.ccbNum}</span>
          <span class="chip">${p.orderName}</span>
          ${duechip(p.inHands)}
          <span class="deco-badge" style="background:${bg};color:${tc};border:1px solid ${tc}22">${p.decoStyleDisplay||'—'}</span>
          <span class="chip ${locked?'qc-pending':'qc-ok'}" id="qc-chip-${p.id}">${locked?"Awaiting QC":"✓ QC'd"}</span>
        </div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">${mediaLinks}</div>
    </div>
    <div class="card-body">
      <div class="info-cell"><div class="info-lbl">Qty</div><div class="info-val mono">${p.qty||'—'}</div></div>
      <div class="info-cell"><div class="info-lbl">Color</div><div class="info-val">${p.color||'—'}</div></div>
      <div class="info-cell"><div class="info-lbl">Size</div><div class="info-val">${p.size||'—'}</div></div>
      <div class="info-cell"><div class="info-lbl">Style #</div><div class="info-val mono">${p.style||'—'}</div></div>
      <div class="info-cell"><div class="info-lbl">Placement</div><div class="info-val">${p.placement||'—'}</div></div>
      <div class="info-cell"><div class="info-lbl">Artwork</div><div class="info-val muted">${p.artworkDesc||'—'}</div></div>
      ${p.prodNotes?`<div class="info-cell wide"><div class="info-lbl">Production Notes</div><div class="info-val muted">${p.prodNotes}</div></div>`:''}
    </div>
    <div class="card-footer">
      <div class="footer-left">
        <span style="font-size:11px;color:var(--text3)">Station:</span>
        ${decoSel}
        <button class="qc-btn ${p.qc?'qcd':''}" onclick="toggleQC('${p.id}',${!p.qc},this)">${p.qc?"✓ QC'd":'QC Sign-off'}</button>
      </div>
      ${section==='active'?`<button class="decorated-btn ${locked?'locked-btn':''}" id="dec-btn-${p.id}" onclick="markDecorated('${p.id}','${p.orderId}',this)">${locked?'🔒 QC Required':'✓ Mark Decorated'}</button>`:''}
    </div>
  </div>`;
}


let allUpcoming=[],allActive=[],sessionDone=[];

async function fetchItems(){
  const q=`{boards(ids:[${ORDERS_BOARD}]){items_page(limit:200){items{id name url column_values(ids:["${O_NUM}","${O_STATUS}","${O_INHAND}","${O_CONTACT}"]){id text value}subitems{id name url column_values(ids:["${S_STATUS}","${S_TYPE}","${S_QTY}","${S_COLOR}","${S_SIZE}","${S_STYLE}","${S_DECO}","${S_PLACEMENT}","${S_ARTWORK_DESC}","${S_PROD_NOTES}","${S_MOCKUP}","${S_ARTWORK}","${S_PROOF}","${S_QC}"]){id text value}}}}}}}`;
  const data=await mq(q);
  return data.boards[0].items_page.items;
}

function parseProduct(item,sub){
  const cv={};for(const c of item.column_values)cv[c.id]=c;
  const sc={};for(const c of sub.column_values)sc[c.id]=c;
  const decoStyleId=parseInt(sc[S_DECO]?.value?JSON.parse(sc[S_DECO].value||'{}')?.ids?.[0]||0:0);
  const decoStyleText=sc[S_DECO]?.text||'';
  const decoStyleDisplay=decoStyleId===3||decoStyleId===4?'DTG / DTF':decoStyleText||'Other';
  let qcVal=false;try{qcVal=JSON.parse(sc[S_QC]?.value||'{}').checked===true;}catch(e){}
  return{id:sub.id,name:sub.name,url:sub.url,orderId:item.id,orderName:item.name,orderUrl:item.url,ccbNum:cv[O_NUM]?.text||'',contact:cv[O_CONTACT]?.text||'',inHands:cv[O_INHAND]?.text||'',qty:sc[S_QTY]?.text||'',color:sc[S_COLOR]?.text||'',size:sc[S_SIZE]?.text||'',style:sc[S_STYLE]?.text||'',decoStyleId,decoStyleText,decoStyleDisplay,placement:sc[S_PLACEMENT]?.text||'',artworkDesc:sc[S_ARTWORK_DESC]?.text||'',prodNotes:sc[S_PROD_NOTES]?.text||'',mockupUrl:ffile(sc[S_MOCKUP]?.value,sc[S_MOCKUP]?.text),artworkUrl:ffile(sc[S_ARTWORK]?.value,sc[S_ARTWORK]?.text),proofUrl:ffile(sc[S_PROOF]?.value,sc[S_PROOF]?.text),qc:qcVal};
}

function sortByDate(arr){return arr.sort((a,b)=>{if(!a.inHands&&!b.inHands)return 0;if(!a.inHands)return 1;if(!b.inHands)return-1;return new Date(a.inHands)-new Date(b.inHands);});}

function renderRecentlyDone(){
  const sec=document.getElementById('recently-section');
  const list=document.getElementById('recently-list');
  if(!sec||!list||sessionDone.length===0){if(sec)sec.style.display='none';return;}
  sec.style.display='block';
  list.innerHTML=sessionDone.map(p=>`<tr>
    <td style="font-weight:500">${p.name}</td>
    <td style="font-family:'DM Mono',monospace;font-size:11px">${p.ccbNum} · ${p.orderName}</td>
    <td>${p.qty||'—'}</td>
    <td>${p.color||'—'}</td>
    <td>${p.size||'—'}</td>
    <td>${fdatestr(p.inHands)}</td>
    <td><span class="done-badge">Decorated</span></td>
  </tr>`).join('');
}

const STATION_IDS=[5];

function updateStats(){
  document.getElementById('stat-up').textContent=allUpcoming.length;
  document.getElementById('stat-ac').textContent=allActive.length;
  document.getElementById('stat-done').textContent=sessionDone.length;
}

function renderContent(){
  let html='';
  html+=`<div class="section-header"><span class="section-label">Upcoming</span><span class="section-count">${allUpcoming.length}</span><div class="section-line"></div></div>`;
  if(allUpcoming.length===0)html+=`<p class="empty-msg">No upcoming products for Engrave.</p>`;
  else { for(const p of allUpcoming){try{html+=buildCard(p,"upcoming")}catch(e){html+=`<div class="error-box"><strong>Card error (${p.name}):</strong> ${e.message}</div>`}} };
  html+=`<div class="section-header" style="margin-top:20px"><span class="section-label">Active</span><span class="section-count">${allActive.length}</span><div class="section-line"></div></div>`;
  if(allActive.length===0)html+=`<p class="empty-msg">No active products for Engrave.</p>`;
  else { for(const p of allActive){try{html+=buildCard(p,"active")}catch(e){html+=`<div class="error-box"><strong>Card error (${p.name}):</strong> ${e.message}</div>`}} };
  document.getElementById('content').innerHTML=html;
}

async function loadData(){
  const btn=document.getElementById('refresh-btn');btn.disabled=true;btn.classList.add('spinning');
  try{
    const items=await fetchItems();
    allUpcoming=[];allActive=[];
    for(const item of items){
      for(const sub of(item.subitems||[])){
        const sc={};for(const c of sub.column_values)sc[c.id]=c;
        const subStatus=(sc[S_STATUS]?.text||'').toLowerCase();
        const subType=(sc[S_TYPE]?.text||'').toLowerCase();
        if(subType!=='in house decoration')continue;
        let decoId=0;try{decoId=JSON.parse(sc[S_DECO]?.value||'{}')?.ids?.[0]||0;}catch(e){}
        if(!STATION_IDS.includes(parseInt(decoId)))continue;
        const p=parseProduct(item,sub);
        if(subStatus==='product ordered')allUpcoming.push(p);
        else if(subStatus==='in house')allActive.push(p);
      }
    }
    sortByDate(allUpcoming);sortByDate(allActive);
    updateStats();renderContent();
    document.getElementById('last-updated').textContent='Updated '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  }catch(err){document.getElementById('content').innerHTML=`<div class="error-box"><strong>Error:</strong> ${err.message}</div>`;}
  btn.disabled=false;btn.classList.remove('spinning');
}
loadData();
</script>
