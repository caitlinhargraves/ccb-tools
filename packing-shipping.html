<style>
  :root{
    --navy:#1B2A4A;--cyan:#00AEEF;--magenta:#EC008C;--yellow:#F5D53B;
    --bg:#E8EBF4;--surface:#FFFFFF;--surface2:#F3F5FA;
    --border:#D1D5DB;--border2:#E5E7EB;
    --text:#1B2A4A;--text2:#6B7280;--text3:#9CA3AF;
    --gold-pale:#F3F5FA;
    --radius:8px;--radius-lg:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh;}
  header{background:var(--surface);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;}
  .logo-area{display:flex;align-items:center;gap:12px;}
  .logo-text{font-size:15px;font-weight:500;color:var(--text);letter-spacing:-0.01em;}
  .logo-text span{color:var(--text2);font-weight:400;font-size:15px;}
  .tabbar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:4px;padding:0 16px;flex-shrink:0;}
  .tab{appearance:none;border:none;background:transparent;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:var(--text2);padding:13px 18px;cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;gap:8px;transition:color .15s,border-color .15s;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--text);border-bottom-color:var(--navy);}
  .tab .emoji{font-size:15px;line-height:1;}
  .frames{flex:1;position:relative;min-height:0;}
  .frames iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:none;background:var(--bg);}
  .frames iframe.active{display:block;}
</style>

<div class="tabbar" role="tablist">
  <button class="tab" id="tab-packing" role="tab" onclick="showTab('packing')"><span class="emoji">📬</span>Packing</button>
  <button class="tab" id="tab-shipping" role="tab" onclick="showTab('shipping')"><span class="emoji">🚚</span>Shipping</button>
</div>

<div class="frames">
  <iframe id="frame-packing" data-src="packingstation.html" title="Packing Station"></iframe>
  <iframe id="frame-shipping" data-src="shipping.html" title="Shipping"></iframe>
</div>

<script>
const TABS=['packing','shipping'];
const STORE_KEY='ps_active_tab';
function showTab(name){
  if(!TABS.includes(name))name='packing';
  TABS.forEach(t=>{
    const tabBtn=document.getElementById('tab-'+t);
    const frame=document.getElementById('frame-'+t);
    const on=(t===name);
    tabBtn.classList.toggle('active',on);
    tabBtn.setAttribute('aria-selected',on?'true':'false');
    frame.classList.toggle('active',on);
    // Lazy-load the iframe the first time its tab is opened
    if(on && !frame.src){frame.src=frame.getAttribute('data-src');}
  });
  try{localStorage.setItem(STORE_KEY,name);}catch(e){}
  if(location.hash.replace('#','')!==name){history.replaceState(null,'','#'+name);}
}
// Initial tab: hash > last used > packing
(function(){
  let initial=location.hash.replace('#','');
  if(!TABS.includes(initial)){
    try{initial=localStorage.getItem(STORE_KEY);}catch(e){}
  }
  showTab(TABS.includes(initial)?initial:'packing');
})();
window.addEventListener('hashchange',()=>{
  const h=location.hash.replace('#','');
  if(TABS.includes(h))showTab(h);
});
</script>
